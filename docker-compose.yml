services:
  db:
    image: postgres:16-alpine
    container_name: naoii-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: naoii
      POSTGRES_PASSWORD: naoii_dev
      POSTGRES_DB: naoii
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
