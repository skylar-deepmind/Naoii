<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512" viewBox="0 0 512 512"
     role="img" aria-labelledby="title desc">
  <title id="title">Naoii universal app icon</title>
  <desc id="desc">Naoii icon on a fixed light rounded badge for reliable contrast on light and dark themes.</desc>

  <!-- Universal light badge -->
  <rect x="16" y="16" width="480" height="480" rx="104"
        fill="#F7F8FA" stroke="#D8DEE5" stroke-width="10"/>

  <!-- Brand icon -->
  <rect x="72" y="72" width="368" height="368" rx="72"
        fill="none" stroke="#172738" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>

  <path fill="#172738" d="
    M 144 150
    H 178
    Q 196 150 210 164
    L 300 254
    H 368
    V 354
    H 338
    Q 320 354 306 340
    L 214 248
    V 222
    H 144
    Z"/>

  <rect x="144" y="240" width="72" height="114" rx="4" fill="#384F67"/>
  <rect x="294" y="150" width="74" height="78" rx="4" fill="#F38A46"/>
</svg>
