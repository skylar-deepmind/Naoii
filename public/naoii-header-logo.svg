    M 146 118
    V 31
    Q 146 13 128 13
    H 28
    Q 10 13 10 31
    V 130
    Q 10 148 28 148
    H 126
    Q 140 148 145 136"
    fill="none" stroke="#172738" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round"/>

